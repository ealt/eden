parallel_variants: 1
evaluate_command: "python3 ${EDEN_EXPERIMENT_DIR}/eval.py"
execute_command: "python3 ${EDEN_EXPERIMENT_DIR}/execute.py"
ideate_command: "python3 ${EDEN_EXPERIMENT_DIR}/ideate.py"
max_variants: 20
max_wall_time: "10m"
evaluation_schema:
  score: real
objective:
  expr: "score"
  direction: "maximize"
