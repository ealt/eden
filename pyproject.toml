[project]
name = "eden"
version = "0"
description = "EDEN workspace root (non-installable). Reference-implementation packages live under reference/packages/*."
requires-python = ">=3.12"

[tool.uv]
package = false

[tool.uv.workspace]
# Add future reference packages here as they are scaffolded; a glob over
# `reference/packages/*` would pick up the .gitkeep placeholder directories
# that Phase 0 created for packages landing in later phases.
members = [
    "reference/packages/eden-contracts",
    "reference/packages/eden-dispatch",
    "reference/packages/eden-git",
    "reference/packages/eden-storage",
    "reference/packages/eden-wire",
]

[tool.uv.sources]
eden-contracts = { workspace = true }
eden-dispatch = { workspace = true }
eden-git = { workspace = true }
eden-storage = { workspace = true }
eden-wire = { workspace = true }

[dependency-groups]
dev = [
    "ruff>=0.7",
    "pyright>=1.1.380",
    "pytest>=8.0",
    "jsonschema>=4.21",
    "referencing>=0.30",
    "pyyaml>=6.0",
    "eden-contracts",
    "eden-dispatch",
    "eden-git",
    "eden-storage",
    "eden-wire",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["A", "B", "D", "E", "F", "I", "PT", "SIM", "UP"]
ignore = ["D100", "D104", "D105", "D107", "SIM108"]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"reference/packages/*/tests/**" = ["D"]
# Wire adapters are thin facades over the Store Protocol; the
# protocol method docstrings are authoritative. B008 is the
# standard FastAPI pattern for Body/Header/Query defaults.
"reference/packages/eden-wire/src/eden_wire/server.py" = ["D", "B008"]
"reference/packages/eden-wire/src/eden_wire/client.py" = ["D102"]

[tool.pyright]
include = [
    "reference/packages/eden-contracts",
    "reference/packages/eden-dispatch",
    "reference/packages/eden-git",
    "reference/packages/eden-storage",
    "reference/packages/eden-wire",
]
typeCheckingMode = "standard"
pythonVersion = "3.12"
reportUnnecessaryTypeIgnoreComment = "warning"
reportMissingTypeStubs = "none"

[tool.pytest.ini_options]
testpaths = [
    "reference/packages/eden-contracts/tests",
    "reference/packages/eden-dispatch/tests",
    "reference/packages/eden-git/tests",
    "reference/packages/eden-storage/tests",
    "reference/packages/eden-wire/tests",
]
