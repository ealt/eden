name: Promote linked issue to In Progress when PR opens

# When a PR opens (or reopens) and its body / branch references issues via
# `Closes #N`, `Fixes #N`, etc., move those issues to "In Progress" in the
# kanban project. The built-in Projects v2 "Pull request linked to issue"
# workflow only auto-adds items; it does NOT set Status. This Action fills
# the gap.
#
# On PR merge → linked-issue auto-promote to Done is handled by the
# existing "Item closed" project workflow (the auto-closed-by-PR issue
# triggers it).

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  promote-linked-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Set linked issues to In Progress in Project #1
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          PROJECT_ID="PVT_kwHOAMaodc4BZpul"
          STATUS_FIELD_ID="PVTSSF_lAHOAMaodc4BZpulzhUm6B8"
          IN_PROGRESS_OPTION_ID="47fc9ee4"

          # Extract issue references from PR body + title.
          # Recognized keywords (per GitHub's PR/Issue auto-link rules):
          # close[s|d], fix[es|ed], resolve[s|d], plus bare #N references.
          # We're conservative: only auto-promote on explicit close-style keywords.
          combined="$PR_BODY $PR_TITLE"
          issues=$(echo "$combined" | grep -oiE '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | grep -oE '#[0-9]+' | tr -d '#' | sort -u)

          if [[ -z "$issues" ]]; then
            echo "No close-style issue references found in PR body/title; skipping."
            exit 0
          fi

          echo "Found linked issues: $issues"

          for n in $issues; do
            # Find the project item ID for this issue
            item_id=$(gh api graphql -f query="
              query {
                repository(owner: \"ealt\", name: \"eden\") {
                  issue(number: $n) {
                    projectItems(first: 10) {
                      nodes { id project { id } }
                    }
                  }
                }
              }" --jq ".data.repository.issue.projectItems.nodes[]? | select(.project.id == \"$PROJECT_ID\") | .id" | head -1)

            if [[ -z "$item_id" ]]; then
              echo "Issue #$n not in project; skipping (manually add to project if it should be tracked)."
              continue
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$item_id\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$IN_PROGRESS_OPTION_ID\" }
                }) {
                  projectV2Item { id }
                }
              }" > /dev/null

            echo "Issue #$n → In Progress"
          done
