name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docs-lint:
    name: docs-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.14.0

      - name: Lint markdown
        run: |
          markdownlint-cli2 "**/*.md" "#node_modules" "#.venv" "#docs/archive/**" "#docs/plans/review/**"

  schema-validity:
    name: schema-validity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install check-jsonschema
        run: pip install 'check-jsonschema==0.29.4'

      - name: Validate each schema against Draft 2020-12 meta-schema
        run: |
          check-jsonschema --check-metaschema spec/v0/schemas/*.schema.json

      - name: Validate experiment fixture against experiment-config schema
        run: |
          check-jsonschema \
            --schemafile spec/v0/schemas/experiment-config.schema.json \
            tests/fixtures/experiment/.eden/config.yaml

  python-lint:
    name: python-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.2'
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check .

  python-typecheck:
    name: python-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.2'
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Pyright
        run: uv run pyright

  python-test:
    name: python-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.2'
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Pytest
        run: uv run pytest -q

  schema-parity:
    name: schema-parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.2'
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Schema ↔ model parity
        run: |
          uv run pytest -q \
            reference/packages/eden-contracts/tests/test_schema_parity.py \
            reference/packages/eden-contracts/tests/test_roundtrip.py

  compose-smoke:
    name: compose-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify docker compose + jq + python3 are available
        run: |
          docker compose version
          jq --version
          python3 --version

      - name: Run compose smoke
        working-directory: reference/compose
        run: bash healthcheck/smoke.sh

  compose-smoke-subprocess:
    name: compose-smoke-subprocess
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify docker compose + jq + python3 are available
        run: |
          docker compose version
          jq --version
          python3 --version

      - name: Run compose smoke (subprocess overlay)
        working-directory: reference/compose
        run: bash healthcheck/smoke-subprocess.sh

  python-test-postgres:
    name: python-test-postgres
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16.6-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.11.2'
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen

      - name: Run parametrized backend tests against Postgres
        env:
          EDEN_TEST_POSTGRES_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: uv run pytest -q reference/packages/eden-storage/tests
