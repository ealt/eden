# Phase 10d follow-up A — docker-exec overlay.
#
# Layered ON TOP of compose.subprocess.yaml:
#
#   docker compose -f compose.yaml \
#                  -f compose.subprocess.yaml \
#                  -f compose.docker-exec.yaml \
#                  --env-file .env up -d --wait
#
# Activates Docker outside of Docker (DooD): every spawn of the
# user's `*_command` runs in a sibling container the worker host
# starts via the host docker daemon (mounted at /var/run/docker.sock).
# Worker-side soft isolation (chunk-10d host mode) is preserved when
# this overlay is NOT layered on; the docker socket is bind-mounted
# only here.
#
# Required env (set by `setup-experiment.sh --exec-mode docker`):
#   EDEN_EXEC_IMAGE          tag of the image used for spawned children
#   EDEN_DOCKER_GID          gid of /var/run/docker.sock as seen
#                            from inside a probe container
#                            (probe-from-inside, NOT host-side stat)
#   EDEN_CIDFILES_DIR_HOST   host-side dir mounted into worker hosts
#                            so cidfiles survive worker restart
#
# See spec/v0/reference-bindings/worker-host-subprocess.md §7 for the
# full design rationale and the soft-boundary security caveat.

name: eden-reference

services:
  ideator-host:
    command:
      - python
      - -m
      - eden_ideator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal ideator-1).
      - ${EDEN_IDEATOR_HOST_WORKER_ID}
      - --mode
      - subprocess
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --artifacts-dir
      - /var/lib/eden/artifacts
      - --ideation-env-file
      - /etc/eden/ideator.env
      - --exec-mode
      - docker
      - --exec-image
      - ${EDEN_EXEC_IMAGE:?}
      - --exec-bind
      - ${EDEN_EXPERIMENT_DIR_HOST:?}:/etc/eden/experiment-dir:ro
      - --cidfile-dir
      - ${EDEN_CIDFILES_DIR_HOST:?}
      # Issue #155: attach the spawned ideator sibling to the compose
      # project network so substrate URLs (EDEN_ARTIFACT_URL,
      # EDEN_READONLY_STORE_URL) resolve from inside the sibling.
      # Without this, docker defaults to the bridge network and the
      # compose-internal hostnames don't resolve — the worker host
      # CLI suppresses the substrate keys.
      - --exec-network
      - ${EDEN_EXEC_NETWORK:-eden-reference_default}
      - --log-level
      - info
    group_add:
      - "${EDEN_DOCKER_GID:?}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the cidfile dir at the SAME path the host uses, so when
      # the worker invokes `docker run --cidfile <path>` the host
      # docker daemon resolves that path to the same directory the
      # worker is reading from. (`docker run --cidfile` is interpreted
      # on the daemon side, not in the calling container's mount
      # namespace — so the path the worker passes must be valid on
      # the host filesystem.)
      - ${EDEN_CIDFILES_DIR_HOST:?}:${EDEN_CIDFILES_DIR_HOST:?}

  executor-host:
    command:
      - python
      - -m
      - eden_executor_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal executor-1).
      - ${EDEN_EXECUTOR_HOST_WORKER_ID}
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --mode
      - subprocess
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --worktrees-dir
      - /var/lib/eden/worktrees
      - --execution-env-file
      - /etc/eden/execute.env
      - --exec-mode
      - docker
      - --exec-image
      - ${EDEN_EXEC_IMAGE:?}
      # Phase 12a-1g: the executor-repo and artifacts substrates are
      # now host bind-mounts under EDEN_EXPERIMENT_DATA_ROOT (chapter
      # 01 §13). The DooD wrap MUST forward them as --exec-bind
      # (host-path → container-path) rather than --exec-volume
      # (named-volume → container-path); otherwise the spawned child
      # mounts a fresh empty named volume on the daemon and never
      # sees the bind-mounted repo / artifacts the worker host wrote.
      - --exec-bind
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/executor-repo:/var/lib/eden/repo
      - --exec-volume
      - eden-worktrees:/var/lib/eden/worktrees
      - --exec-bind
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/artifacts:/var/lib/eden/artifacts:ro
      - --exec-bind
      - ${EDEN_EXPERIMENT_DIR_HOST:?}:/etc/eden/experiment-dir:ro
      - --cidfile-dir
      - ${EDEN_CIDFILES_DIR_HOST:?}
      # Issue #155: attach the spawned executor sibling to the
      # compose project network so substrate URLs resolve from
      # inside it (see ideator-host above for full rationale).
      - --exec-network
      - ${EDEN_EXEC_NETWORK:-eden-reference_default}
      - --log-level
      - info
    group_add:
      - "${EDEN_DOCKER_GID:?}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the cidfile dir at the SAME path the host uses, so when
      # the worker invokes `docker run --cidfile <path>` the host
      # docker daemon resolves that path to the same directory the
      # worker is reading from. (`docker run --cidfile` is interpreted
      # on the daemon side, not in the calling container's mount
      # namespace — so the path the worker passes must be valid on
      # the host filesystem.)
      - ${EDEN_CIDFILES_DIR_HOST:?}:${EDEN_CIDFILES_DIR_HOST:?}

  evaluator-host:
    command:
      - python
      - -m
      - eden_evaluator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal evaluator-1).
      - ${EDEN_EVALUATOR_HOST_WORKER_ID}
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --mode
      - subprocess
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --worktrees-dir
      - /var/lib/eden/worktrees
      - --evaluation-env-file
      - /etc/eden/evaluation.env
      - --exec-mode
      - docker
      - --exec-image
      - ${EDEN_EXEC_IMAGE:?}
      # Phase 12a-1g: evaluator-repo is a host bind-mount under
      # EDEN_EXPERIMENT_DATA_ROOT (see executor-host above for the
      # full rationale). Worktrees stay an ephemeral named volume.
      - --exec-bind
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/evaluator-repo:/var/lib/eden/repo
      - --exec-volume
      - eden-worktrees:/var/lib/eden/worktrees
      - --exec-bind
      - ${EDEN_EXPERIMENT_DIR_HOST:?}:/etc/eden/experiment-dir:ro
      - --cidfile-dir
      - ${EDEN_CIDFILES_DIR_HOST:?}
      # Issue #155: attach the spawned evaluator sibling to the
      # compose project network so substrate URLs resolve from
      # inside it (see ideator-host above for full rationale).
      - --exec-network
      - ${EDEN_EXEC_NETWORK:-eden-reference_default}
      - --log-level
      - info
    group_add:
      - "${EDEN_DOCKER_GID:?}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Bind the cidfile dir at the SAME path the host uses, so when
      # the worker invokes `docker run --cidfile <path>` the host
      # docker daemon resolves that path to the same directory the
      # worker is reading from. (`docker run --cidfile` is interpreted
      # on the daemon side, not in the calling container's mount
      # namespace — so the path the worker passes must be valid on
      # the host filesystem.)
      - ${EDEN_CIDFILES_DIR_HOST:?}:${EDEN_CIDFILES_DIR_HOST:?}
