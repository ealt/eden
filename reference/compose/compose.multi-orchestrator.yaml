# 12a-2 wave 7 overlay — second auto-orchestrator instance.
#
# Layered on top of compose.yaml to exercise the §6.4 multi-instance
# safety invariants in the smoke-multi-orchestrator drill. Adds a
# second orchestrator container that holds its own unique worker_id
# and joins the `orchestrators` group at startup via the same
# `_ensure_orchestrators_membership` helper the primary orchestrator
# uses.
#
# #128: the worker id is an opaque `wkr_*` supplied via
# EDEN_ORCHESTRATOR_2_WORKER_ID. setup-experiment mints only the
# single-replica infra workers, so the multi-orchestrator smoke (the
# only consumer of this overlay) mints + exports this second id before
# bringing the overlay up. The primary orchestrator from compose.yaml
# uses EDEN_ORCHESTRATOR_WORKER_ID; two unique opaque ids are required
# because the worker registry is identity-keyed and a duplicate id
# would clobber the credential.
#
# Compose drops this overlay's services on `compose down`; nothing
# here is needed outside the multi-orchestrator smoke.

services:
  orchestrator-2:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-orchestrator-2
    restart: "on-failure"
    depends_on:
      task-store-server:
        condition: service_healthy
    command:
      - python
      - -m
      - eden_orchestrator
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted + exported by the multi-orchestrator
      # smoke (was literal orchestrator-2). See this overlay's header.
      - ${EDEN_ORCHESTRATOR_2_WORKER_ID:?EDEN_ORCHESTRATOR_2_WORKER_ID must be set (multi-orchestrator smoke mints it)}
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      # Issue #157: max_quiescent_iterations is read from the
      # experiment-config YAML (single-experiment mode), so orchestrator-2
      # picks up the same value as the primary orchestrator from the
      # shared eden-experiment-config.
      - --poll-interval
      - "1.0"
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
    volumes:
      # Separate per-replica repo volume so neither orchestrator's git
      # state collides with the other. Per-replica clones is the
      # design posture; the wire is the only synchronization point.
      - eden-orchestrator-2-repo:/var/lib/eden/repo
      - eden-orchestrator-2-credentials:/var/lib/eden/credentials
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro

volumes:
  eden-orchestrator-2-repo:
  eden-orchestrator-2-credentials:
