name: eden-reference

x-eden-logging: &eden-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: postgres:16.6-alpine
    container_name: eden-postgres
    restart: unless-stopped
    logging: *eden-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eden}
      POSTGRES_USER: ${POSTGRES_USER:-eden}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      # #147: second logical database for the control-plane store
      # (chapter 11 §3.4 Option A — same instance, separate database).
      # Read by the init hook mounted below; the hook creates it only
      # on a fresh data dir (upstream image behavior). See
      # reference/compose/README.md "Multi-experiment mode" for the
      # existing-data-root upgrade path.
      POSTGRES_DB_CONTROL_PLANE: ${POSTGRES_DB_CONTROL_PLANE:-eden_control_plane}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      # Durable substrate (Phase 12a-1g): host bind-mount under the
      # per-experiment data root so the substrate survives Docker
      # Desktop VM rebuilds, factory resets, and any other event that
      # destroys named-volume backing storage. See chapter 01 §13.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?EDEN_EXPERIMENT_DATA_ROOT must be set (run setup-experiment)}/postgres:/var/lib/postgresql/data
      # #147: create the control-plane database on first init. The
      # upstream postgres image runs /docker-entrypoint-initdb.d/*.sh
      # exactly once, on a fresh data dir.
      - ./init-control-plane-db.sh:/docker-entrypoint-initdb.d/01-control-plane-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eden} -d ${POSTGRES_DB:-eden}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  forgejo:
    image: codeberg.org/forgejo/forgejo:11-rootless
    container_name: eden-forgejo
    restart: unless-stopped
    logging: *eden-logging
    environment:
      FORGEJO__server__DOMAIN: localhost
      FORGEJO__server__ROOT_URL: http://localhost:${FORGEJO_HOST_PORT:-3001}/
      FORGEJO__server__HTTP_PORT: "3000"
      # SSH_PORT is the *advertised* port (shown in clone URLs); it must
      # match the host-side mapping so SSH clones work. SSH_LISTEN_PORT
      # is what Forgejo binds inside the container, kept fixed at 2222
      # so the published mapping below stays valid even when a user
      # overrides FORGEJO_SSH_HOST_PORT to dodge a host collision.
      FORGEJO__server__SSH_PORT: "${FORGEJO_SSH_HOST_PORT:-2222}"
      FORGEJO__server__SSH_LISTEN_PORT: "2222"
      FORGEJO__database__DB_TYPE: sqlite3
      # NOTE: container-internal path stays `/var/lib/gitea/` — see the
      # volume mount below for the rationale (upstream image VOLUME
      # declarations retain Gitea's legacy paths; do not rename to
      # match the Forgejo brand surface, see issue #129).
      FORGEJO__database__PATH: /var/lib/gitea/data/forgejo.db
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__security__SECRET_KEY: ${FORGEJO_SECRET_KEY:?FORGEJO_SECRET_KEY must be set}
      FORGEJO__security__INTERNAL_TOKEN: ${FORGEJO_INTERNAL_TOKEN:?FORGEJO_INTERNAL_TOKEN must be set}
      FORGEJO__service__DISABLE_REGISTRATION: "true"
      FORGEJO__evaluation__ENABLED: "false"
      FORGEJO__log__LEVEL: Warn
    ports:
      - "${FORGEJO_HOST_PORT:-3001}:3000"
      - "${FORGEJO_SSH_HOST_PORT:-2222}:2222"
    volumes:
      # Durable substrate (Phase 12a-1g) — see postgres above.
      #
      # The container target is `/var/lib/gitea`, NOT `/var/lib/forgejo`,
      # despite this being the Forgejo image. This is intentional:
      # the Forgejo image is a soft fork of Gitea and its Dockerfile
      # declares `VOLUME ["/etc/gitea", "/var/lib/gitea"]` to preserve
      # migration compatibility from Gitea deployments. Forgejo
      # writes its data to `/var/lib/gitea/` regardless of the brand;
      # binding a different container path (e.g. `/var/lib/forgejo`)
      # leaves the actual data path backed by an anonymous Docker
      # volume that does NOT survive Docker Desktop VM restarts or
      # `docker volume prune`, silently breaking the 12a-1g durability
      # contract. See issue #129 for the bug history.
      #
      # The host-side path (`$EDEN_EXPERIMENT_DATA_ROOT/forgejo`) is
      # under our control and uses the Forgejo brand name. The
      # container target is image-defined; do not rename it.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?EDEN_EXPERIMENT_DATA_ROOT must be set (run setup-experiment)}/forgejo:/var/lib/gitea
      # Companion config bind-mount (issue #130, follow-up to #129).
      # The container target is `/etc/gitea`, NOT `/etc/forgejo`, for
      # the same reason as the data mount above: the upstream image's
      # VOLUME declaration retains Gitea's legacy paths, and Forgejo
      # writes its generated `app.ini` (plus other config state — the
      # internal SSH host keys it derives from FORGEJO__security__*,
      # any operator-edited overrides applied via `forgejo admin`) to
      # `/etc/gitea/` regardless of the brand. Without this mount the
      # config dir is backed by an anonymous Docker volume that does
      # NOT survive Docker Desktop VM restarts or `docker volume
      # prune`, so a `compose down` (or even `docker volume prune`)
      # silently discards every config change. The data mount alone
      # is not enough — Forgejo splits durable state across both
      # directories.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?EDEN_EXPERIMENT_DATA_ROOT must be set (run setup-experiment)}/forgejo-etc:/etc/gitea
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/version"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ---------------------------------------------------------------
  # 10b/10c: EDEN reference services
  # ---------------------------------------------------------------
  #
  # Note: a one-shot `blob-init` busybox service was removed in
  # Phase 12a-1g alongside the `eden-blob-data` named volume. Its
  # original purpose was to materialize the unmounted top-level
  # volume at compose-up time and to give postgres/forgejo a
  # `service_completed_successfully` dependency for --wait. With
  # bind-mounts (substrate dirs created by setup-experiment) the
  # first need is gone; postgres/forgejo no longer need that
  # dependency either.

  eden-repo-init:
    # Setup-time tool, NOT in any other service's depends_on. Invoked
    # by setup-experiment via `compose run --rm --no-deps`. The
    # `setup` profile keeps it out of plain `compose up`.
    profiles: ["setup"]
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-repo-init
    restart: "no"
    # The compose default command stays a no-arg seed for parity with
    # local dev. setup-experiment.sh OVERRIDES this when invoking via
    # `compose run` to add --push-to + --credential-helper.
    command:
      - python
      - -m
      - eden_service_common.repo_init
      - --repo-path
      - /var/lib/eden/repo
    volumes:
      - eden-repo-init-staging:/var/lib/eden/repo

  task-store-server:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-task-store-server
    restart: unless-stopped
    logging: *eden-logging
    depends_on:
      postgres:
        condition: service_healthy
    # 12a-1f: --readonly-password reads EDEN_READONLY_PASSWORD; we
    # also pass --artifacts-dir so the /_reference/artifacts route
    # serves real bytes via a read-only bind-mount of the artifacts
    # substrate (see the `volumes:` block below; 12a-1g converted
    # the artifacts store from a named volume to a host bind-mount
    # under the experiment data root). In the base scripted-mode
    # stack the artifacts dir is mounted ro here too, but the
    # scripted ideator emits fake URIs so the route returns 404;
    # that's fine — see plan §6.6.
    #
    # EDEN_LOG_DIR (issue #109): file-handler companion to the
    # docker json-file driver. The shared logger writes
    # /var/lib/eden/logs/<service>.jsonl alongside stdout; the
    # host-side bind-mount below survives `compose down -v`.
    environment:
      EDEN_READONLY_PASSWORD: ${EDEN_READONLY_PASSWORD:?EDEN_READONLY_PASSWORD must be set (run setup-experiment)}
      EDEN_LOG_DIR: /var/lib/eden/logs
    command:
      - python
      - -m
      - eden_task_store_server
      - --store-url
      - ${EDEN_STORE_URL:?EDEN_STORE_URL must be set (run setup-experiment)}
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?EDEN_EXPERIMENT_ID must be set (run setup-experiment)}
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --base-commit-sha
      - ${EDEN_BASE_COMMIT_SHA:?EDEN_BASE_COMMIT_SHA must be set (run setup-experiment)}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?EDEN_ADMIN_TOKEN must be set (run setup-experiment)}
      - --artifacts-dir
      - /var/lib/eden/artifacts
      # Issue #294: the checkpoint export's repo.bundle source. The
      # task-store-server keeps its own bare clone of the Forgejo
      # repo of record at --repo-path and syncs it from --forgejo-url
      # per export (clone on first export, fetch --prune thereafter).
      # The sync is LAZY — nothing touches Forgejo at startup, which
      # keeps the checkpoint-import receiver posture working (the
      # smoke brings up only postgres + task-store-server, no
      # forgejo; see smoke-checkpoint.sh phase 4). NO depends_on on
      # forgejo for the same reason. As a side benefit the synced
      # clone deepens the §3.3 tree-identity resolver that --repo-path
      # also wires.
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
    volumes:
      # 12a-1f: read-only bind-mount of the artifacts dir so the
      # /_reference/experiments/<id>/artifacts/<path> route can
      # serve idea content + evaluator-supplied artifacts. The
      # web-ui already bind-mounts this same dir rw (per 12a-1g
      # durability migration); the task-store-server gets ro
      # because it only reads.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/artifacts:/var/lib/eden/artifacts:ro
      # Issue #294: the checkpoint repo clone (rw — the export's
      # clone/fetch writes here) + the Forgejo HTTP credential
      # helper, mirroring the orchestrator's mounts.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/task-store-repo:/var/lib/eden/repo
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro
      # Issue #109: per-service log bind-mount (writable). Survives
      # `compose down -v`. setup-experiment.sh creates the host-side
      # dir tree.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/task-store-server:/var/lib/eden/logs
    ports:
      # Exposed on the host for manual-UI tooling (scripts under
      # reference/scripts/manual-ui/ and the eden-manual-* skills).
      # Bearer-token protected; safe enough for local dev.
      - "${TASK_STORE_HOST_PORT:-8080}:8080"
    healthcheck:
      # Authenticated GET against an experiment-scoped endpoint
      # confirms both that the process is up and that auth wiring
      # works. CMD argv form (NOT CMD-SHELL) so Compose interpolates
      # `.env` values exactly once; no shell re-parses them, so
      # quotes / spaces / shell metacharacters in the token or
      # experiment id can't break or alter the command.
      test:
        - CMD
        - curl
        - -fsS
        - -H
        - "Authorization: Bearer admin:${EDEN_ADMIN_TOKEN}"
        - -H
        - "X-Eden-Experiment-Id: ${EDEN_EXPERIMENT_ID}"
        - http://localhost:8080/v0/experiments/${EDEN_EXPERIMENT_ID}/events
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ---------------------------------------------------------------
  # 12c / #147: deployment-level control plane (chapter 11)
  # ---------------------------------------------------------------
  #
  # First-class always-on service (issue #147). The orchestrator and
  # web-ui only TALK to it when EDEN_CONTROL_PLANE_URL is set in the
  # env; with it empty (the default + the existing six smokes) they
  # run single-experiment and ignore the control plane, so this
  # container is exercised for clean startup but otherwise idle.
  # State-sync poller is always on (--task-store-url set); with no
  # registered experiments it no-ops. Store is Postgres-backed (the
  # eden_control_plane database created by the postgres init hook) so
  # lease + registry state survives a control-plane restart, per
  # chapter 11 §3.4 Option A.
  control-plane:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-control-plane
    restart: unless-stopped
    logging: *eden-logging
    depends_on:
      postgres:
        condition: service_healthy
      task-store-server:
        condition: service_healthy
    environment:
      # Issue #109: file-handler companion to docker json-file driver.
      EDEN_LOG_DIR: /var/lib/eden/logs
    command:
      - python
      - -m
      - eden_control_plane_server
      - --store-url
      - ${EDEN_CONTROL_PLANE_STORE_URL:?EDEN_CONTROL_PLANE_STORE_URL must be set (run setup-experiment)}
      - --host
      - 0.0.0.0
      - --port
      - "8081"
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --task-store-url
      - http://task-store-server:8080
      - --lease-duration-seconds
      - "${EDEN_LEASE_DURATION_SECONDS:-30}"
      - --state-sync-interval-seconds
      - "${EDEN_STATE_SYNC_INTERVAL_SECONDS:-30}"
      - --state-sync-failure-threshold
      - "${EDEN_STATE_SYNC_FAILURE_THRESHOLD:-10}"
      - --log-level
      - info
    volumes:
      # Issue #109: per-service log bind-mount (writable). setup-experiment
      # creates the host-side dir.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/control-plane:/var/lib/eden/logs
    ports:
      - "${CONTROL_PLANE_HOST_PORT:-8081}:8081"
    healthcheck:
      # /healthz lives outside /v0/control so it needs no auth header.
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8081/healthz
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  orchestrator:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-orchestrator
    # `on-failure` (not `unless-stopped`) — the orchestrator exits 0
    # on quiescence, and `unless-stopped` would treat that as
    # something to recover from and re-run the loop in a tight
    # restart cycle. `on-failure` lets a clean exit stick.
    restart: "on-failure"
    logging: *eden-logging
    depends_on:
      task-store-server:
        condition: service_healthy
      # #147: the control plane is always-on; wait for it so that when
      # EDEN_CONTROL_PLANE_URL is set (lease-driven mode) the startup
      # control-plane bootstrap doesn't race the server coming up. In
      # single-experiment mode (URL empty) the orchestrator ignores it.
      control-plane:
        condition: service_healthy
    command:
      - python
      - -m
      - eden_orchestrator
      - --task-store-url
      - http://task-store-server:8080
      # --experiment-id is always passed; it is the active experiment in
      # single-experiment mode and only a logging label in lease-driven
      # mode (the CLI selects mode solely on --control-plane-url / the
      # EDEN_CONTROL_PLANE_URL env fallback being set). See issue #147.
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was the literal
      # default `orchestrator`). Plain ${VAR} (not :? / :-): the id is
      # SERVER-minted, so it cannot exist until setup-experiment has
      # brought the task-store-server up and registered the worker —
      # which is AFTER setup's own `docker compose build`. A :? guard
      # would trip that build (compose v2 interpolates every service's
      # command even for an unrelated `build`/`up <svc>`); setup always
      # writes the minted id to .env before the operator's final
      # `docker compose up`, mirroring the host-worker vars below.
      - ${EDEN_ORCHESTRATOR_WORKER_ID}
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      # The orchestrator reads the ideation_policy block from the
      # experiment config to build the policy callable invoked when
      # dispatch_mode.ideation_creation == "auto". Absent block →
      # maintain_pending(target=3).
      # Compose-friendly quiescence: 30 iterations × 1s = 30s of
      # zero progress before the orchestrator declares the
      # experiment done. Tuned for the smoke tests where worker
      # hosts auto-claim within milliseconds. Manual-UI sessions
      # (a human at the keyboard) want a much higher value — set
      # EDEN_MAX_QUIESCENT_ITERATIONS in .env to override. See
      # GitHub issue #98 for the design discussion (the structural fix
      # — orchestrator as cross-experiment infra — is deferred to
      # Phase 12c control plane).
      - --poll-interval
      - "1.0"
      - --max-quiescent-iterations
      - "${EDEN_MAX_QUIESCENT_ITERATIONS:-30}"
      # #147: lease duration for chapter 11 lease-driven mode. Only
      # meaningful when EDEN_CONTROL_PLANE_URL is set; harmless (parsed,
      # unused) in single-experiment mode.
      - --lease-duration-seconds
      - "${EDEN_LEASE_DURATION_SECONDS:-30}"
      # 12a-3 wave 4: --termination-policy gates the new decision-type 0
      # branch. Default `default_termination_policy` returns
      # `never_terminate`; deployments that want policy-driven
      # termination point this at a configured factory (see
      # docs/operations/experiment-lifecycle.md for the patterns).
      - --termination-policy
      - ${EDEN_TERMINATION_POLICY:-eden_dispatch.termination:default_termination_policy}
      # Issue #131: automatic-checkpoint destination. A fixed container
      # path bind-mounted from ${EDEN_EXPERIMENT_DATA_ROOT}/checkpoints
      # (host path is deployment wiring, not the portable config block).
      # No-op unless the experiment-config carries
      # `auto_checkpoint: {enabled: true}`; the orchestrator fails fast at
      # startup if enabled and this dir is unwritable or no admin token is
      # available (EDEN_ADMIN_TOKEN is already wired above).
      - --auto-checkpoint-dir
      - /var/lib/eden/checkpoints
      - --log-level
      - info
    environment:
      # 12a-3 wave 4: per-policy configuration. The
      # `env_max_variants_policy` factory reads this; other
      # deployment-supplied policies MAY follow the same convention.
      EDEN_TERMINATION_MAX_VARIANTS: ${EDEN_TERMINATION_MAX_VARIANTS:-}
      # #147: lease-driven (chapter 11 multi-experiment) mode toggle.
      # Empty (default + the existing six smokes) → single-experiment
      # mode, control plane ignored. Non-empty → the orchestrator CLI's
      # env fallback sets --control-plane-url and the §5 lease loop runs.
      EDEN_CONTROL_PLANE_URL: ${EDEN_CONTROL_PLANE_URL:-}
      # Issue #109: file-handler companion to docker json-file driver.
      EDEN_LOG_DIR: /var/lib/eden/logs
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
    volumes:
      # Durable substrates (Phase 12a-1g) under the per-experiment
      # data root. The per-host bare clone survives restart so the
      # orchestrator does not re-clone from Forgejo on every boot, and
      # the per-host credentials survive so the worker's per-worker
      # bearer is reused instead of re-bootstrapped via the admin
      # token. See chapter 01 §13.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/orchestrator-repo:/var/lib/eden/repo
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/credentials/orchestrator:/var/lib/eden/credentials
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro
      # Issue #109: per-service log bind-mount.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/orchestrator:/var/lib/eden/logs
      # Issue #131: automatic-checkpoint destination bind-mount. The
      # orchestrator writes periodic + terminal checkpoint .tar archives
      # here (no-op unless auto_checkpoint.enabled in the experiment
      # config); operators read them back from the host checkpoints dir.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/checkpoints:/var/lib/eden/checkpoints

  ideator-host:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-ideator-host
    restart: unless-stopped
    logging: *eden-logging
    depends_on:
      task-store-server:
        condition: service_healthy
    command:
      - python
      - -m
      - eden_ideator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal
      # ideator-1). The host's bootstrap_worker_credential reuses the
      # token setup persisted to credentials/ideator/<id>.token. NOT
      # guarded with :? — under --no-auto-host-workers this is empty in
      # .env and the operator brings the stack up WITHOUT the host
      # services; compose validates ALL services' interpolation on every
      # operation, so a :? here would break that documented flow.
      - ${EDEN_IDEATOR_HOST_WORKER_ID}
      - --base-commit-sha
      - ${EDEN_BASE_COMMIT_SHA:?EDEN_BASE_COMMIT_SHA must be set (run setup-experiment)}
      - --log-level
      - info
    environment:
      # Issue #109: file-handler companion to docker json-file driver.
      EDEN_LOG_DIR: /var/lib/eden/logs
    volumes:
      # Durable substrate (Phase 12a-1g).
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/credentials/ideator:/var/lib/eden/credentials
      # Issue #109: per-service log bind-mount.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/ideator-host:/var/lib/eden/logs

  executor-host:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-executor-host
    restart: unless-stopped
    logging: *eden-logging
    depends_on:
      task-store-server:
        condition: service_healthy
    command:
      - python
      - -m
      - eden_executor_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal
      # executor-1). See ideator-host for the no-:? rationale.
      - ${EDEN_EXECUTOR_HOST_WORKER_ID}
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --log-level
      - info
    environment:
      # Issue #109: file-handler companion to docker json-file driver.
      EDEN_LOG_DIR: /var/lib/eden/logs
    volumes:
      # Durable substrates (Phase 12a-1g).
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/executor-repo:/var/lib/eden/repo
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/credentials/executor:/var/lib/eden/credentials
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro
      # Issue #109: per-service log bind-mount.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/executor-host:/var/lib/eden/logs

  evaluator-host:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-evaluator-host
    restart: unless-stopped
    logging: *eden-logging
    depends_on:
      task-store-server:
        condition: service_healthy
    command:
      - python
      - -m
      - eden_evaluator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal
      # evaluator-1). See ideator-host for the no-:? rationale.
      - ${EDEN_EVALUATOR_HOST_WORKER_ID}
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --log-level
      - info
    environment:
      # Issue #109: file-handler companion to docker json-file driver.
      EDEN_LOG_DIR: /var/lib/eden/logs
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
    volumes:
      # Durable substrate (Phase 12a-1g).
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/credentials/evaluator:/var/lib/eden/credentials
      # Issue #109: per-service log bind-mount.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/evaluator-host:/var/lib/eden/logs

  web-ui:
    image: eden-reference:dev
    build:
      context: ../..
      dockerfile: reference/compose/Dockerfile
    container_name: eden-web-ui
    restart: unless-stopped
    logging: *eden-logging
    depends_on:
      task-store-server:
        condition: service_healthy
    command:
      - python
      - -m
      - eden_web_ui
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      # Issue #145: per-experiment config + credential dirs for the
      # experiment switcher. --experiment-config is the deployment
      # default; non-default experiments load <dir>/<id>.yaml from the
      # config dir. --credentials-dir keeps the web-ui's per-experiment
      # worker tokens on the mounted credentials volume (the new
      # resolve_credential_dir otherwise falls back to an in-container
      # XDG path that is not persisted).
      - --experiment-config-dir
      - /var/lib/eden/web-ui-configs
      - --credentials-dir
      - /var/lib/eden/credentials
      - --session-secret
      - ${EDEN_SESSION_SECRET:?EDEN_SESSION_SECRET must be set (run setup-experiment)}
      - --artifacts-dir
      - /var/lib/eden/artifacts
      - --repo-path
      - /var/lib/eden/repo
      # Issue #145: durable per-experiment clone dir for the switcher
      # (non-default experiments clone <repo-root>/<id>.git here). Bind-
      # mounted below — the parent of --repo-path is the container
      # filesystem and would not survive a restart.
      - --repo-root
      - /var/lib/eden/web-ui-repos
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --clone-url
      # Embed HTTP Basic credentials so the operator-facing `git clone`
      # command works directly (issue #161). Local-demo posture: the
      # password is rendered in the executor draft page HTML. Override
      # FORGEJO_CLONE_URL_HOST to point at a remote where the operator
      # already has credentials configured for deployments where this
      # leakage is unacceptable.
      - ${FORGEJO_CLONE_URL_HOST:-http://eden:${FORGEJO_REMOTE_PASSWORD:?}@localhost:${FORGEJO_HOST_PORT:-3001}/eden/${EDEN_EXPERIMENT_ID:?}.git}
      - --base-commit-sha
      - ${EDEN_BASE_COMMIT_SHA:?EDEN_BASE_COMMIT_SHA must be set (run setup-experiment)}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was the literal
      # default `web-ui-1`). Plain ${VAR} (not :?): server-minted, so it
      # only exists after setup brings the task-store-server up — AFTER
      # setup's own `docker compose build`, which a :? guard would trip
      # (compose interpolates every service's command). setup writes the
      # minted id to .env before the operator's final `up`.
      - ${EDEN_WEB_UI_WORKER_ID}
      - --host
      - 0.0.0.0
      - --port
      - "8090"
      - --log-level
      - info
    environment:
      # #147: when set, the web-ui CLI's env fallback supplies
      # --control-plane-url and mounts the cross-experiment
      # /admin/experiments/ dashboard (chapter 11). Empty (default +
      # the existing six smokes) → the dashboard route stays 404 and
      # the web-ui operates against the single --experiment-id.
      # Replaces the retired compose.control-plane.yaml overlay. The
      # control-plane admin token defaults to EDEN_ADMIN_TOKEN inside
      # the CLI, so no separate token env is needed here.
      EDEN_CONTROL_PLANE_URL: ${EDEN_CONTROL_PLANE_URL:-}
      # Issue #109: file-handler companion to docker json-file driver.
      EDEN_LOG_DIR: /var/lib/eden/logs
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
    volumes:
      # Durable substrates (Phase 12a-1g).
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/web-ui-repo:/var/lib/eden/repo
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/artifacts:/var/lib/eden/artifacts
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/credentials/web-ui:/var/lib/eden/credentials
      # Issue #145: per-experiment config YAMLs + per-experiment clones
      # for the switcher.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/web-ui-configs:/var/lib/eden/web-ui-configs
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/web-ui-repos:/var/lib/eden/web-ui-repos
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro
      # Issue #109: per-service log bind-mount.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/logs/web-ui:/var/lib/eden/logs
    ports:
      - "${WEB_UI_HOST_PORT:-8090}:8090"
    healthcheck:
      # CMD argv form (no shell). The literal URL has no
      # interpolated user-controlled pieces, but staying consistent
      # with the task-store-server healthcheck above is cheaper than
      # leaving one shell-interpreted check around.
      test:
        - CMD
        - curl
        - -fsS
        - http://localhost:8090/healthz
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

configs:
  eden-experiment-config:
    file: ./experiment-config.yaml

volumes:
  # =================================================================
  # Durable vs ephemeral classification (Phase 12a-1g, chapter 01 §13)
  #
  # Every volume that holds protocol-owned state — the task store,
  # the git remote, the artifact store, per-host bare clones, and
  # per-host persisted worker credentials — is now a host bind-mount
  # under ${EDEN_EXPERIMENT_DATA_ROOT}/<subdir>, declared inline on
  # each service's `volumes:` list above. That removes them from
  # this `volumes:` section entirely.
  #
  # The volumes remaining below are intentionally EPHEMERAL: they
  # hold per-task scratch (`eden-worktrees`, declared by the
  # subprocess overlay) or bootstrap-staging (`eden-repo-init-
  # staging`, discarded on every re-seed). They MUST NOT carry any
  # protocol-owned state that would violate chapter 01 §13.
  # =================================================================

  # Staging volume gets an explicit `name:` so setup-experiment.sh can
  # `docker volume rm eden-repo-init-staging` cleanly when --seed-from
  # is passed (otherwise compose's `<project>_<volume>` prefix makes
  # the name operator-deployment-dependent and re-seeds silently
  # no-op because repo-init short-circuits with
  # EDEN_REPO_ALREADY_SEEDED). Resolved via closed issue #55.
  eden-repo-init-staging:
    name: eden-repo-init-staging
