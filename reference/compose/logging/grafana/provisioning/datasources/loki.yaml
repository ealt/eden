# Auto-provision the Loki datasource (issue #110). Grafana reads this
# file on every start; the datasource is reconstructed from it, so
# Grafana needs no durable storage (compose.logging.yaml gives it
# none). A malformed file here leaves Grafana up but WITHOUT the
# datasource — /api/health still returns "ok" — so smoke-logging.sh
# asserts the datasource is present via /api/datasources, not just
# /api/health (plan §10 "Grafana provisioning fails silently").
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    # In-network Loki service (compose.logging.yaml). Grafana proxies
    # queries server-side, so this is the compose hostname, not a
    # host-exposed port (Loki has no host port).
    url: http://loki:3100
    isDefault: true
    # Stable uid so the pre-provisioned dashboard can reference the
    # datasource by uid rather than by name.
    uid: eden-loki
    jsonData:
      # Single-tenant (auth_enabled: false in loki-config.yaml); no
      # X-Scope-OrgID needed.
      maxLines: 1000
    editable: false
