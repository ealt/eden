# Phase 10d subprocess-mode overlay.
#
# Layered on top of compose.yaml:
#
#   docker compose -f compose.yaml -f compose.subprocess.yaml --env-file .env up -d --wait
#
# Switches the planner / implementer / evaluator hosts to
# `--mode subprocess`, bind-mounts the experiment directory
# (`EDEN_EXPERIMENT_DIR_HOST`), and adds a volume for per-task
# worktrees. The user's `plan_command` / `implement_command` /
# `evaluate_command` come from the same experiment-config.yaml the
# scripted-mode stack already mounts.
#
# When this overlay is active, the orchestrator's `--plan-tasks`
# count must still be a comma-separated list of plan task ids
# (e.g. plan-1,plan-2,plan-3); that flag is unchanged.

name: eden-reference

services:
  planner-host:
    command:
      - python
      - -m
      - eden_planner_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --shared-token
      - ${EDEN_SHARED_TOKEN:?}
      - --worker-id
      - planner-1
      - --mode
      - subprocess
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --artifacts-dir
      - /var/lib/eden/artifacts
      - --plan-env-file
      - /etc/eden/planner.env
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
      - source: eden-planner-env
        target: /etc/eden/planner.env
    volumes:
      - type: bind
        source: ${EDEN_EXPERIMENT_DIR_HOST:?EDEN_EXPERIMENT_DIR_HOST must be set (run setup-experiment with --experiment-dir)}
        target: /etc/eden/experiment-dir
        read_only: true
      - eden-artifacts-data:/var/lib/eden/artifacts

  implementer-host:
    command:
      - python
      - -m
      - eden_implementer_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --shared-token
      - ${EDEN_SHARED_TOKEN:?}
      - --worker-id
      - implementer-1
      - --repo-path
      - /var/lib/eden/repo
      - --mode
      - subprocess
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --worktrees-dir
      - /var/lib/eden/worktrees
      - --implement-env-file
      - /etc/eden/implement.env
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
      - source: eden-implement-env
        target: /etc/eden/implement.env
    volumes:
      - eden-bare-repo:/var/lib/eden/repo
      - eden-worktrees:/var/lib/eden/worktrees
      # Read-only mount of the planner-written rationale tree so the
      # implementer can resolve `proposal.artifacts_uri` →
      # `task.json.rationale_path` per plan §D.3.
      - type: volume
        source: eden-artifacts-data
        target: /var/lib/eden/artifacts
        read_only: true
      - type: bind
        source: ${EDEN_EXPERIMENT_DIR_HOST:?}
        target: /etc/eden/experiment-dir
        read_only: true

  evaluator-host:
    command:
      - python
      - -m
      - eden_evaluator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --shared-token
      - ${EDEN_SHARED_TOKEN:?}
      - --worker-id
      - evaluator-1
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --mode
      - subprocess
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --repo-path
      - /var/lib/eden/repo
      - --worktrees-dir
      - /var/lib/eden/worktrees
      - --evaluate-env-file
      - /etc/eden/evaluate.env
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
      - source: eden-evaluate-env
        target: /etc/eden/evaluate.env
    volumes:
      - eden-bare-repo:/var/lib/eden/repo
      - eden-worktrees:/var/lib/eden/worktrees
      - type: bind
        source: ${EDEN_EXPERIMENT_DIR_HOST:?}
        target: /etc/eden/experiment-dir
        read_only: true

configs:
  eden-planner-env:
    content: |
      EDEN_BASE_COMMIT_SHA=${EDEN_BASE_COMMIT_SHA:?}
      EDEN_PROPOSALS_PER_PLAN=${EDEN_PROPOSALS_PER_PLAN:-1}
  # Implementer / evaluator env files default to empty bodies so the
  # `--*-env-file` flags resolve against a real path. Operators
  # extend these (typically with API keys for an LLM-driven
  # implement_command / evaluate_command) by editing the overlay or
  # mounting a different source.
  eden-implement-env:
    content: |
      # implementer subprocess env — extend with API keys etc.
  eden-evaluate-env:
    content: |
      # evaluator subprocess env — extend with API keys etc.

volumes:
  eden-worktrees:
