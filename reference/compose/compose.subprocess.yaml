# Phase 10d subprocess-mode overlay (host-mode default).
#
# Layered on top of compose.yaml:
#
#   docker compose -f compose.yaml -f compose.subprocess.yaml --env-file .env up -d --wait
#
# This overlay switches the ideator / executor / evaluator hosts
# to `--mode subprocess` and bind-mounts the experiment dir so the
# user's `*_command` runs in the worker host container itself
# (chunk-10d behavior — no docker access).
#
# To run the user command in a sibling container instead (chunk-10d
# follow-up A docker mode), layer `compose.docker-exec.yaml` ON TOP
# of this file. That second overlay is the only place the docker
# socket gets mounted into worker hosts, so plain subprocess mode
# keeps the soft-isolation security posture chunk 10d shipped.
#
# When this overlay is active, the orchestrator's `--ideation-tasks`
# value must still be a comma-separated list of ideation task ids
# (e.g. plan-1,plan-2,plan-3); that flag is unchanged.

name: eden-reference

services:
  ideator-host:
    # 12a-1f: subprocess-mode ideator gains the same --repo-path /
    # --forgejo-url / --credential-helper triple that executor +
    # evaluator already use, plus the substrate-access env vars
    # threaded into the spawned *_command. Scripted-mode (base
    # compose.yaml) doesn't get these — see plan §D.1 / §5.8.
    environment:
      EDEN_REPO_DIR: /var/lib/eden/repo
      EDEN_ARTIFACT_URL: http://task-store-server:8080/_reference/experiments/${EDEN_EXPERIMENT_ID:?}/artifacts/
      EDEN_ARTIFACT_PATH_ROOT: /var/lib/eden/artifacts
      EDEN_READONLY_STORE_URL: ${EDEN_READONLY_STORE_URL:?EDEN_READONLY_STORE_URL must be set (run setup-experiment)}
    command:
      - python
      - -m
      - eden_ideator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal ideator-1).
      - ${EDEN_IDEATOR_HOST_WORKER_ID}
      - --mode
      - subprocess
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --artifacts-dir
      - /var/lib/eden/artifacts
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --ideation-env-file
      - /etc/eden/ideator.env
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
      - source: eden-ideator-env
        target: /etc/eden/ideator.env
    volumes:
      - type: bind
        source: ${EDEN_EXPERIMENT_DIR_HOST:?EDEN_EXPERIMENT_DIR_HOST must be set (run setup-experiment with --experiment-dir)}
        target: /etc/eden/experiment-dir
        read_only: true
      # Phase 12a-1g: artifacts substrate is a bind-mount under the
      # data root (was `eden-artifacts-data` named volume). The
      # ideator writes idea content here; the executor reads it back
      # via task.json.content_path.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/artifacts:/var/lib/eden/artifacts
      # Phase 12a-1f git substrate: per-host bare clone for the
      # ideator subprocess. compose.yaml's scripted-mode ideator has
      # no /var/lib/eden/repo mount, so this overlay declares the
      # bind-mount cleanly here (no name-collision with a base-stack
      # volume at the same target). Pattern mirrors 12a-1g's
      # per-host-repo bind-mount discipline. Clone-on-startup
      # populates it from Forgejo on first run; subsequent starts fetch.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/ideator-repo:/var/lib/eden/repo
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro

  executor-host:
    # Issue #154: substrate env vars threaded to the executor
    # subprocess so agentic executors can read git / artifacts /
    # readonly Postgres alongside their cwd-anchored worktree.
    environment:
      EDEN_REPO_DIR: /var/lib/eden/repo
      EDEN_ARTIFACT_URL: http://task-store-server:8080/_reference/experiments/${EDEN_EXPERIMENT_ID:?}/artifacts/
      EDEN_ARTIFACT_PATH_ROOT: /var/lib/eden/artifacts
      EDEN_READONLY_STORE_URL: ${EDEN_READONLY_STORE_URL:?}
    command:
      - python
      - -m
      - eden_executor_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal executor-1).
      - ${EDEN_EXECUTOR_HOST_WORKER_ID}
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --mode
      - subprocess
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --worktrees-dir
      - /var/lib/eden/worktrees
      - --execution-env-file
      - /etc/eden/execute.env
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
      - source: eden-execute-env
        target: /etc/eden/execute.env
    volumes:
      # Phase 12a-1g: the per-host bare clone, forgejo credentials,
      # and credentials volume are already declared in compose.yaml's
      # executor-host service (now as bind-mounts under the data
      # root). Compose merges service-level `volumes:` additively —
      # NOT key-replace — so the overlay does NOT re-declare them.
      # Re-declaring eden-executor-repo:/var/lib/eden/repo here
      # would mount BOTH a bind and a fresh empty named volume at
      # the same target, with whichever ordered last winning.
      - eden-worktrees:/var/lib/eden/worktrees
      # Read-only mount of the ideator-written content tree so the
      # executor can resolve `idea.artifacts_uri` →
      # `task.json.content_path` per plan §D.3.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/artifacts:/var/lib/eden/artifacts:ro
      - type: bind
        source: ${EDEN_EXPERIMENT_DIR_HOST:?}
        target: /etc/eden/experiment-dir
        read_only: true

  evaluator-host:
    # 12a-1f: substrate env vars threaded to the evaluator
    # subprocess. Repo / artifact mounts already exist (10d-fb).
    environment:
      EDEN_REPO_DIR: /var/lib/eden/repo
      EDEN_ARTIFACT_URL: http://task-store-server:8080/_reference/experiments/${EDEN_EXPERIMENT_ID:?}/artifacts/
      EDEN_ARTIFACT_PATH_ROOT: /var/lib/eden/artifacts
      EDEN_READONLY_STORE_URL: ${EDEN_READONLY_STORE_URL:?}
    command:
      - python
      - -m
      - eden_evaluator_host
      - --task-store-url
      - http://task-store-server:8080
      - --experiment-id
      - ${EDEN_EXPERIMENT_ID:?}
      - --admin-token
      - ${EDEN_ADMIN_TOKEN:?}
      - --worker-id
      # #128: opaque wkr_* minted by setup-experiment (was literal evaluator-1).
      - ${EDEN_EVALUATOR_HOST_WORKER_ID}
      - --experiment-config
      - /etc/eden/experiment-config.yaml
      - --mode
      - subprocess
      - --experiment-dir
      - /etc/eden/experiment-dir
      - --repo-path
      - /var/lib/eden/repo
      - --forgejo-url
      - ${FORGEJO_REMOTE_URL:?}
      - --credential-helper
      - /etc/eden/credential-helper.sh
      - --worktrees-dir
      - /var/lib/eden/worktrees
      - --evaluation-env-file
      - /etc/eden/evaluation.env
      - --log-level
      - info
    configs:
      - source: eden-experiment-config
        target: /etc/eden/experiment-config.yaml
      - source: eden-evaluation-env
        target: /etc/eden/evaluation.env
    volumes:
      # Phase 12a-1g: the base evaluator-host service does NOT mount
      # /var/lib/eden/repo (scripted-mode evaluator doesn't need
      # workspace access). Subprocess mode needs it for creating
      # per-task worktrees, so the overlay declares it here as a
      # bind-mount under the data root.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/evaluator-repo:/var/lib/eden/repo
      - ${EDEN_FORGEJO_CREDS_DIR_HOST:?}/credential-helper.sh:/etc/eden/credential-helper.sh:ro
      - eden-worktrees:/var/lib/eden/worktrees
      # 12a-1f: evaluator subprocess reads idea content artifacts
      # via EDEN_ARTIFACT_URL or directly from this mount (host-side
      # path equals EDEN_ARTIFACT_PATH_ROOT). Phase 12a-1g converted
      # the artifacts store from a named volume to a host bind-mount
      # under the data root.
      - ${EDEN_EXPERIMENT_DATA_ROOT:?}/artifacts:/var/lib/eden/artifacts:ro
      - type: bind
        source: ${EDEN_EXPERIMENT_DIR_HOST:?}
        target: /etc/eden/experiment-dir
        read_only: true

configs:
  eden-ideator-env:
    content: |
      EDEN_BASE_COMMIT_SHA=${EDEN_BASE_COMMIT_SHA:?}
      EDEN_IDEAS_PER_IDEATION=${EDEN_IDEAS_PER_IDEATION:-1}
  # Executor / evaluator env files default to empty bodies so the
  # `--*-env-file` flags resolve against a real path. Operators
  # extend these (typically with API keys for an LLM-driven
  # execution_command / evaluation_command) by editing the overlay or
  # mounting a different source.
  eden-execute-env:
    content: |
      # executor subprocess env — extend with API keys etc.
  eden-evaluation-env:
    content: |
      # evaluator subprocess env — extend with API keys etc.

volumes:
  # Same `name:` discipline as the bare-repo + artifacts volumes in
  # compose.yaml — needed for --exec-mode docker volume forwarding
  # (compose.docker-exec.yaml). Pinning the name in this overlay
  # keeps host-mode and docker-mode using the same volume name.
  eden-worktrees:
    name: eden-worktrees
