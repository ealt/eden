[project]
name = "eden-storage"
version = "0.0.1"
description = "Storage protocol + reference backends for the EDEN protocol (spec/v0 chapter 8)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "eden-contracts",
    "pydantic>=2.9,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eden_storage"]
