[project]
name = "eden-storage"
version = "0.0.1"
description = "Storage protocol + reference backends for the EDEN protocol (spec/v0 chapter 8)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "argon2-cffi>=23.1,<24",
    "eden-checkpoint",
    "eden-contracts",
    "psycopg[binary]>=3.2,<4",
    "pydantic>=2.9,<3",
]

# Optional cloud blob backends (issue #174). Kept out of the base deps so
# plain installs (conformance, in-memory test posture, deployments that stay
# on --blob-backend file) pull in neither SDK. S3Backend / GcsBackend lazily
# import their SDK and raise install-guidance if the extra is absent.
[project.optional-dependencies]
s3 = ["boto3>=1.34,<2"]
gcs = ["google-cloud-storage>=2.18,<3"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eden_storage"]
