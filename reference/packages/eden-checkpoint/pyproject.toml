[project]
name = "eden-checkpoint"
version = "0.0.1"
description = "Portable checkpoint format reader/writer for the EDEN protocol (spec/v0/10-checkpoints.md)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "eden-contracts",
    "pydantic>=2.9,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eden_checkpoint"]
