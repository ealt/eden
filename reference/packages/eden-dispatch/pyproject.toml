[project]
name = "eden-dispatch"
version = "0.0.1"
description = "In-memory reference dispatch loop for the EDEN protocol (spec/v0)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "eden-contracts",
    "pydantic>=2.9,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eden_dispatch"]
