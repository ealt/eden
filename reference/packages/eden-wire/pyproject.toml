[project]
name = "eden-wire"
version = "0.0.1"
description = "HTTP wire binding (FastAPI server + httpx client) for the EDEN protocol (spec/v0 chapter 7)."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "eden-checkpoint",
    "eden-contracts",
    "eden-storage",
    "fastapi>=0.115,<1",
    "httpx>=0.27,<1",
    "pydantic>=2.9,<3",
    # Required by Starlette's request.form() multipart parser, used by the
    # §16 artifact deposit handler (issue #166). Declared explicitly so a
    # standalone eden-wire install can parse deposits (it was previously
    # only present transitively via eden-web-ui).
    "python-multipart>=0.0.9",
    "uvicorn>=0.30,<1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/eden_wire"]
