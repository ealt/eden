# Pinned values for the helm-smoke / helm-lint CI jobs. NOT for production —
# secrets are dev placeholders inline and storage sizes are minimized for a
# single-node kind cluster.
#
# CI builds the reference image locally and `kind load`s it as
# eden-reference:ci, so pullPolicy is Never (nothing is pulled from a registry).
image:
  repository: eden-reference
  tag: ci
  pullPolicy: Never

experiment:
  # A valid opaque exp_* placeholder (lint/template only). setup-experiment-helm.sh
  # overrides this with --set-string experiment.id=<minted exp_*> at install time.
  # An operator-typed mnemonic (e.g. "exp-1") is invalid post-#128 — the event
  # model rejects any id not matching ^exp_[0-9a-hjkmnp-tv-z]{26}$.
  id: exp_0123456789abcdefghjkmnpqrs
  # baseCommitSha is left empty: setup-experiment-helm.sh seeds Forgejo, then
  # `helm upgrade --set experiment.baseCommitSha=<sha>` brings the app tier up.
  baseCommitSha: ""
  config:
    parallel_variants: 1
    evaluation_schema:
      score: real
    objective:
      expr: "score"
      direction: "maximize"
    ideation_policy:
      kind: fixed_total
      total: 3

# replicas.orchestrator defaults to 1 (single-experiment); no override needed.
# Lease-driven HA is opt-in (orchestrator.leaseMode.enabled) and deferred (#281),
# so the smoke runs the default single-experiment path that compose-smoke validates.

secrets:
  adminToken: ci-admin-token
  sessionSecret: ci-session-secret
  postgresPassword: cipgpassword
  readonlyPassword: cireadonlypassword
  forgejoRemotePassword: ciforgejopassword
  forgejoSecretKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd"
  forgejoInternalToken: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd"

storage:
  postgresSize: 1Gi
  forgejoSize: 1Gi
  orchestratorRepoSize: 1Gi
  executorRepoSize: 1Gi
  evaluatorRepoSize: 1Gi
  webUiRepoSize: 1Gi
  artifactsSize: 1Gi

config:
  # Run-forever quiescence per Decision 9 (Kubernetes restartPolicy: Always).
  maxQuiescentIterations: 0

blob:
  # Default file backend, minimized for the single-node kind cluster.
  file:
    size: 1Gi
