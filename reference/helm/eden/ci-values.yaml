# Pinned values for the helm-smoke / helm-lint CI jobs. NOT for production —
# secrets are dev placeholders inline and storage sizes are minimized for a
# single-node kind cluster.
#
# CI builds the reference image locally and `kind load`s it as
# eden-reference:ci, so pullPolicy is Never (nothing is pulled from a registry).
image:
  repository: eden-reference
  tag: ci
  pullPolicy: Never

experiment:
  id: exp-1
  # baseCommitSha is left empty: setup-experiment-helm.sh seeds Forgejo, then
  # `helm upgrade --set experiment.baseCommitSha=<sha>` brings the app tier up.
  baseCommitSha: ""
  config:
    parallel_variants: 1
    evaluation_schema:
      score: real
    objective:
      expr: "score"
      direction: "maximize"
    ideation_policy:
      kind: fixed_total
      total: 3

# Single orchestrator replica keeps the kind footprint small; the lease model
# still applies (one replica, one lease).
replicas:
  orchestrator: 1

secrets:
  adminToken: ci-admin-token
  sessionSecret: ci-session-secret
  postgresPassword: cipgpassword
  readonlyPassword: cireadonlypassword
  forgejoRemotePassword: ciforgejopassword
  forgejoSecretKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd"
  forgejoInternalToken: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcd"

storage:
  postgresSize: 1Gi
  forgejoSize: 1Gi
  orchestratorRepoSize: 1Gi
  executorRepoSize: 1Gi
  evaluatorRepoSize: 1Gi
  webUiRepoSize: 1Gi
  artifactsSize: 1Gi

config:
  # Lower lease duration for a faster HA hand-off drill; quiescence stays 0
  # (run forever) per Decision 9.
  leaseDurationSeconds: 15
  maxQuiescentIterations: 0
