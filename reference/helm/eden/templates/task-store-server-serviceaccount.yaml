{{- /*
Dedicated ServiceAccount for the task-store-server, rendered only when a
cloud blob backend uses pod identity (issue #174): EKS IRSA
(blob.s3.irsa.enabled) or GKE Workload Identity
(blob.gcs.workloadIdentity.enabled). The annotation is what the cloud SDK's
default credential chain detects; the IAM role / GCP SA binding is created
by the operator out-of-band (see docs/deployment/migrating-to-blob-backend.md).
Scoped to the ONE pod that touches the bucket — workers deposit and fetch
artifacts over the wire (eden://artifacts/<id>), so no other pod needs
bucket credentials.
*/}}
{{- $s3Irsa := and (eq .Values.blob.backend "s3") .Values.blob.s3.irsa.enabled }}
{{- $gcsWi := and (eq .Values.blob.backend "gcs") .Values.blob.gcs.workloadIdentity.enabled }}
{{- if and (eq (include "eden.appEnabled" .) "true") (or $s3Irsa $gcsWi) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eden.fullname" . }}-task-store-server
  labels:
    {{- include "eden.componentLabels" (dict "ctx" . "component" "task-store-server") | nindent 4 }}
  annotations:
    {{- if $s3Irsa }}
    eks.amazonaws.com/role-arn: {{ .Values.blob.s3.irsa.roleArn | quote }}
    {{- end }}
    {{- if $gcsWi }}
    iam.gke.io/gcp-service-account: {{ .Values.blob.gcs.workloadIdentity.serviceAccount | quote }}
    {{- end }}
{{- end }}
