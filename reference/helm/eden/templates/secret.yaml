{{- /*
NOTE: this chart-managed Secret is deleted by `helm uninstall`, but the
StatefulSet PVCs (Postgres data, …) are intentionally RETAINED. A reinstall
then regenerates secrets while the Postgres data dir still holds the OLD role
password, so the rendered DSNs can no longer authenticate. For any deployment
you intend to uninstall + reinstall (rather than fully tearing down PVCs), use
secrets.existingSecret so the credentials outlive the release. See
docs/deployment/helm.md §5 "PVC retention".

DSN composition by postgres.mode (13c):
  * embedded — the three Postgres DSNs are composed here from postgres.user /
    postgres.database + the chart-managed passwords (unchanged from 13a; the
    embedded branch below renders byte-for-byte the same when tls is off, so a
    13a→13c upgrade triggers no rollout). A TLS suffix is appended when
    postgres.tls.enabled.
  * external + connectionString — EDEN_STORE_URL (+ the readonly / control-plane
    keys) carry the operator-supplied DSN with the TLS suffix appended. The
    embedded-only POSTGRES_PASSWORD / EDEN_READONLY_PASSWORD keys are NOT emitted
    (no in-cluster Postgres to authenticate). v0 points all three DSNs at the one
    operator DSN — separate readonly-role / control-plane-database provisioning on
    a managed instance is the operator's concern (deferral: issue #299).
  * external + existingSecret — the chart-managed Secret omits the DSN keys
    entirely; the task-store-server sources EDEN_STORE_URL from the operator's
    Secret via an explicit env override (task-store-server-deployment.yaml).
*/ -}}
{{- if not .Values.secrets.existingSecret }}
{{- $fullName := include "eden.fullname" . }}
{{- $tls := include "eden.tlsSuffix" . }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $fullName }}-secrets
  labels:
    {{- include "eden.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- if eq .Values.postgres.mode "external" }}
  EDEN_ADMIN_TOKEN: {{ required "secrets.adminToken is required (or set secrets.existingSecret)" .Values.secrets.adminToken | quote }}
  EDEN_SESSION_SECRET: {{ required "secrets.sessionSecret is required (or set secrets.existingSecret)" .Values.secrets.sessionSecret | quote }}
  FORGEJO_REMOTE_PASSWORD: {{ required "secrets.forgejoRemotePassword is required (or set secrets.existingSecret)" .Values.secrets.forgejoRemotePassword | quote }}
  FORGEJO_SECRET_KEY: {{ required "secrets.forgejoSecretKey is required (or set secrets.existingSecret)" .Values.secrets.forgejoSecretKey | quote }}
  FORGEJO_INTERNAL_TOKEN: {{ required "secrets.forgejoInternalToken is required (or set secrets.existingSecret)" .Values.secrets.forgejoInternalToken | quote }}
{{- if .Values.postgres.external.connectionString }}
  {{- /* external + inline connectionString: write the operator DSN (+ TLS
         suffix) into all three keys. external.existingSecret takes precedence
         (handled by the task-store-server env override), so it is intentionally
         NOT branched here — set connectionString OR existingSecret, not both. */ -}}
  {{- $dsn := printf "%s%s" .Values.postgres.external.connectionString $tls }}
  EDEN_STORE_URL: {{ $dsn | quote }}
  EDEN_READONLY_STORE_URL: {{ $dsn | quote }}
  EDEN_CONTROL_PLANE_STORE_URL: {{ $dsn | quote }}
{{- end }}
{{- else }}
{{- $pw := required "secrets.postgresPassword is required (or set secrets.existingSecret)" .Values.secrets.postgresPassword }}
{{- $roPw := required "secrets.readonlyPassword is required (or set secrets.existingSecret)" .Values.secrets.readonlyPassword }}
{{- $pgHost := printf "%s-postgres:5432" $fullName }}
  EDEN_ADMIN_TOKEN: {{ required "secrets.adminToken is required (or set secrets.existingSecret)" .Values.secrets.adminToken | quote }}
  EDEN_SESSION_SECRET: {{ required "secrets.sessionSecret is required (or set secrets.existingSecret)" .Values.secrets.sessionSecret | quote }}
  EDEN_READONLY_PASSWORD: {{ $roPw | quote }}
  POSTGRES_PASSWORD: {{ $pw | quote }}
  FORGEJO_REMOTE_PASSWORD: {{ required "secrets.forgejoRemotePassword is required (or set secrets.existingSecret)" .Values.secrets.forgejoRemotePassword | quote }}
  FORGEJO_SECRET_KEY: {{ required "secrets.forgejoSecretKey is required (or set secrets.existingSecret)" .Values.secrets.forgejoSecretKey | quote }}
  FORGEJO_INTERNAL_TOKEN: {{ required "secrets.forgejoInternalToken is required (or set secrets.existingSecret)" .Values.secrets.forgejoInternalToken | quote }}
  # Derived Postgres DSNs. The password is interpolated verbatim, so it MUST be
  # URL-safe (the setup script generates hex; supply pre-encoded DSNs via
  # existingSecret if you use a password with reserved URI characters).
  EDEN_STORE_URL: {{ printf "postgresql://%s:%s@%s/%s%s" .Values.postgres.user $pw $pgHost .Values.postgres.database $tls | quote }}
  EDEN_READONLY_STORE_URL: {{ printf "postgresql://eden_readonly:%s@%s/%s%s" $roPw $pgHost .Values.postgres.database $tls | quote }}
  EDEN_CONTROL_PLANE_STORE_URL: {{ printf "postgresql://%s:%s@%s/%s%s" .Values.postgres.user $pw $pgHost .Values.postgres.controlPlaneDatabase $tls | quote }}
{{- end }}
{{- end }}
