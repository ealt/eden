{{/*
EDEN deployment Secret — chart-managed (DEV path).

When .Values.secrets.existingSecret is empty, the chart materializes a
single Secret named "<fullname>-secrets" holding the deployment credentials.
All service pods reference this Secret via envFrom: secretRef:
{{ include "eden.secretName" . }}.

When existingSecret is set, this template is skipped and operators pre-create
the Secret externally (Sealed Secrets, External Secrets Operator, Vault,
etc.) with the same key shape:

  EDEN_ADMIN_TOKEN
  POSTGRES_PASSWORD
  GITEA_ADMIN_PASSWORD
  GITEA_REMOTE_PASSWORD
  EDEN_SESSION_SECRET
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "eden.secretName" . }}
  labels:
    {{- include "eden.labels" . | nindent 4 }}
type: Opaque
stringData:
  EDEN_ADMIN_TOKEN: {{ required "secrets.adminToken is required when secrets.existingSecret is empty" .Values.secrets.adminToken | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when secrets.existingSecret is empty" .Values.secrets.postgresPassword | quote }}
  GITEA_ADMIN_PASSWORD: {{ required "secrets.giteaAdminPassword is required when secrets.existingSecret is empty" .Values.secrets.giteaAdminPassword | quote }}
  GITEA_REMOTE_PASSWORD: {{ required "secrets.giteaRemotePassword is required when secrets.existingSecret is empty" .Values.secrets.giteaRemotePassword | quote }}
  GITEA_SECRET_KEY: {{ required "secrets.giteaSecretKey is required when secrets.existingSecret is empty" .Values.secrets.giteaSecretKey | quote }}
  GITEA_INTERNAL_TOKEN: {{ required "secrets.giteaInternalToken is required when secrets.existingSecret is empty" .Values.secrets.giteaInternalToken | quote }}
  EDEN_SESSION_SECRET: {{ required "secrets.webUiSessionSecret is required when secrets.existingSecret is empty" .Values.secrets.webUiSessionSecret | quote }}
{{- end }}
