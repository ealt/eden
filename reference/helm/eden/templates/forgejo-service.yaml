{{- $fullName := include "eden.fullname" . }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-forgejo
  labels:
    {{- include "eden.componentLabels" (dict "ctx" . "component" "forgejo") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "eden.componentSelectorLabels" (dict "ctx" . "component" "forgejo") | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
