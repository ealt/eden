{{- if eq (include "eden.appEnabled" .) "true" }}
{{- $fullName := include "eden.fullname" . }}
{{- $blobFile := eq .Values.blob.backend "file" }}
{{- $blobS3 := eq .Values.blob.backend "s3" }}
{{- $blobGcs := eq .Values.blob.backend "gcs" }}
{{- $s3Irsa := and $blobS3 .Values.blob.s3.irsa.enabled }}
{{- $gcsWi := and $blobGcs .Values.blob.gcs.workloadIdentity.enabled }}
{{- $gcsKeyFile := and $blobGcs (not .Values.blob.gcs.workloadIdentity.enabled) .Values.blob.gcs.existingSecret }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}-task-store-server
  labels:
    {{- include "eden.componentLabels" (dict "ctx" . "component" "task-store-server") | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.taskStoreServer }}
  {{- if $blobFile }}
  # The blob PVC is ReadWriteOnce; the default RollingUpdate strategy starts
  # the replacement pod before the old one releases the volume, deadlocking
  # the rollout on a multi-attach error. Recreate trades a brief gap (the
  # app tier's readiness probes already tolerate store restarts) for a
  # rollout that always completes.
  strategy:
    type: Recreate
    # Explicitly clear rollingUpdate: a release installed before the Recreate
    # switch has API-server-defaulted rollingUpdate values on the live object,
    # and an upgrade that only patches `type` leaves them in place — the API
    # server then rejects the object ("rollingUpdate: Forbidden: may not be
    # specified when strategy `type` is 'Recreate'"). null deletes the field
    # in the upgrade patch.
    rollingUpdate: null
  {{- end }}
  selector:
    matchLabels:
      {{- include "eden.componentSelectorLabels" (dict "ctx" . "component" "task-store-server") | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "eden.rolloutChecksums" . | nindent 8 }}
      labels:
        {{- include "eden.componentLabels" (dict "ctx" . "component" "task-store-server") | nindent 8 }}
    spec:
      {{- if or $s3Irsa $gcsWi }}
      # Pod identity for the cloud blob backend (issue #174): the dedicated
      # SA carries the IRSA / Workload Identity annotation the SDK detects.
      serviceAccountName: {{ $fullName }}-task-store-server
      {{- end }}
      {{- if $blobFile }}
      # The image runs as eden (uid 1000); a freshly-provisioned PVC mounts
      # root-owned. fsGroup makes the blob mount group-writable — the same
      # posture the web-ui StatefulSet takes for its repo/artifacts PVCs.
      securityContext:
        fsGroup: 1000
      {{- end }}
      {{- include "eden.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: task-store-server
          image: {{ include "eden.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "eden.secretName" . }}
          {{- if or (and $blobS3 (not $s3Irsa)) $gcsKeyFile (eq .Values.postgres.mode "external") }}
          env:
            {{- if and $blobS3 (not $s3Irsa) }}
            # Static-credentials fallback (issue #174): boto3's default
            # chain reads these env vars; the literal secret never reaches
            # argv. values.schema.json guarantees existingSecret is set when
            # IRSA is off.
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.blob.s3.existingSecret | quote }}
                  key: {{ .Values.blob.s3.accessKeyIdKey | quote }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.blob.s3.existingSecret | quote }}
                  key: {{ .Values.blob.s3.secretAccessKeyKey | quote }}
            {{- end }}
            {{- if $gcsKeyFile }}
            # Service-account-key fallback (issue #174): the GCP SDK's
            # default chain reads the key file this env var points at.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/run/secrets/eden/gcs/{{ .Values.blob.gcs.serviceAccountKeyKey }}
            {{- end }}
            {{- if eq .Values.postgres.mode "external" }}
            # External Postgres: EDEN does NOT provision the eden_readonly role
            # on a managed instance (no DCL there — see the runbook). The
            # task-store-server runs ensure_readonly_role only when
            # EDEN_READONLY_PASSWORD is non-empty; blank it here so that an
            # operator's whole-chart secrets.existingSecret carrying the key does
            # not trigger CREATE/ALTER ROLE/GRANT (which fails for provider
            # accounts without role-management privilege). Tracked: #299.
            - name: EDEN_READONLY_PASSWORD
              value: ""
            {{- if .Values.postgres.external.existingSecret }}
            # DSN lives in the operator's Secret, not the chart-managed one. This
            # explicit entry overrides the envFrom import (which omits
            # EDEN_STORE_URL in this case) so $(EDEN_STORE_URL) below resolves to
            # the operator-supplied DSN.
            - name: EDEN_STORE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.external.existingSecret | quote }}
                  key: {{ .Values.postgres.external.connectionStringKey | default "EDEN_STORE_URL" | quote }}
            {{- end }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
          args:
            - python
            - -m
            - eden_task_store_server
            - --store-url
            - $(EDEN_STORE_URL)
            - --experiment-id
            - {{ required "experiment.id is required" .Values.experiment.id | quote }}
            - --experiment-config
            - /etc/eden/experiment-config.yaml
            - --base-commit-sha
            - {{ .Values.experiment.baseCommitSha | quote }}
            - --admin-token
            - $(EDEN_ADMIN_TOKEN)
            # §16 artifact blob backend selection (issue #174). The wire
            # surface is identical across modes (eden://artifacts/<id>);
            # only where the bytes land differs.
            - --blob-backend
            - {{ .Values.blob.backend | quote }}
            {{- if $blobFile }}
            - --artifact-blob-dir
            - {{ .Values.blob.file.mountPath | quote }}
            {{- end }}
            {{- if $blobS3 }}
            - --blob-s3-bucket
            - {{ .Values.blob.s3.bucket | quote }}
            {{- with .Values.blob.s3.region }}
            - --blob-s3-region
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.blob.s3.prefix }}
            - --blob-s3-prefix
            - {{ . | quote }}
            {{- end }}
            {{- with .Values.blob.s3.endpointUrl }}
            - --blob-s3-endpoint-url
            - {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if $blobGcs }}
            - --blob-gcs-bucket
            - {{ .Values.blob.gcs.bucket | quote }}
            {{- with .Values.blob.gcs.prefix }}
            - --blob-gcs-prefix
            - {{ . | quote }}
            {{- end }}
            {{- end }}
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - --log-level
            - info
          # The task-store-server has no /healthz route and its experiment-
          # scoped endpoints require an auth header that probe exec commands
          # cannot supply ($(VAR) is not expanded in probes). A TCP probe on
          # the bound port is sufficient for readiness ordering — uvicorn
          # binds 8080 only once the app is constructed.
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: experiment-config
              mountPath: /etc/eden/experiment-config.yaml
              subPath: experiment-config.yaml
            {{- if $blobFile }}
            - name: blob-data
              mountPath: {{ .Values.blob.file.mountPath | quote }}
            {{- end }}
            {{- if $gcsKeyFile }}
            - name: gcs-credentials
              mountPath: /var/run/secrets/eden/gcs
              readOnly: true
            {{- end }}
            {{- if and .Values.postgres.tls.enabled .Values.postgres.tls.caBundleSecret }}
            # Provider CA bundle for sslmode=verify-ca/verify-full. The DSN
            # references it via sslrootcert=/etc/eden/postgres-ca/<caBundleKey>
            # (appended by the eden.tlsSuffix helper).
            - name: postgres-ca
              mountPath: /etc/eden/postgres-ca
              readOnly: true
            {{- end }}
          {{- with .Values.resources }}
          resources: {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: experiment-config
          configMap:
            name: {{ $fullName }}-experiment-config
        {{- if $blobFile }}
        - name: blob-data
          persistentVolumeClaim:
            claimName: {{ $fullName }}-blob-data
        {{- end }}
        {{- if $gcsKeyFile }}
        - name: gcs-credentials
          secret:
            secretName: {{ .Values.blob.gcs.existingSecret | quote }}
        {{- end }}
        {{- if and .Values.postgres.tls.enabled .Values.postgres.tls.caBundleSecret }}
        - name: postgres-ca
          secret:
            secretName: {{ .Values.postgres.tls.caBundleSecret | quote }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $fullName }}-task-store-server
  labels:
    {{- include "eden.componentLabels" (dict "ctx" . "component" "task-store-server") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "eden.componentSelectorLabels" (dict "ctx" . "component" "task-store-server") | nindent 4 }}
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
